<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="content">
        <div id="Title"><h1>Etch-A-Sketch</h1></div>
        <div id="squareGrid">
        </div>
        <div class="buttons">
            <button id="resetButton">RESET</button>
            <button id="blackButton">BLACK</button>
            <button id="opacityButton">OPACITY</button>
            <button id="randomButton">RANDOM COLOR</button>
            <button id="gridButton">SQUARES SIZE</button>
        </div>
    </div>
</body>
</html>
